services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: apple_hk
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: flaskpass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web1:
    build: .
    container_name: flask_web1
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://flaskuser:flaskpass@db:3306/apple_hk
    ports:
      - "5001:5000"
    command: gunicorn -b 0.0.0.0:5000 run:app

  web2:
    build: .
    container_name: flask_web2
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://flaskuser:flaskpass@db:3306/apple_hk
    ports:
      - "5002:5000"
    command: gunicorn -b 0.0.0.0:5000 run:app

volumes:
  mysql_data:
