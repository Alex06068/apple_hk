{% extends "base.html" %}

{% block title %}支援 - Apple Store{% endblock %}

{% block content %}
<div class="container">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">需要協助嗎？</h1>
        <p class="lead">由此入手，尋找答案、使用技巧及更多資訊</p>
    </div>

    <div class="row g-4">
        {% for article in articles %}
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ article.title }}</h5>
                    <p class="card-text text-muted">{{ article.summary or article.content[:100] }}...</p>
                    <a href="{{ url_for('public.article', article_id=article.id) }}" class="btn btn-link px-0">閱讀更多 →</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
