{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row g-5">
        <div class="col-md-6">
            <div class="sticky-top" style="top: 100px;">
                <div class="p-5 bg-light rounded-5 shadow-sm mb-4">
                    <img src="{{ url_for('static', filename='img/products/' + (product.image_filename or 'default.jpg')) }}" 
                         class="img-fluid" alt="{{ product.name }}">
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <h6 class="text-primary fw-bold mb-2">全新上市</h6>
            <h1 class="display-5 fw-bold mb-3">{{ product.name }}</h1>
            <p class="fs-4 text-muted mb-4">{{ product.subtitle }}</p>
            
            <div class="d-flex align-items-baseline mb-5">
                <span class="fs-2 fw-bold text-dark">HK$ {{ "{:,.0f}".format(product.price) }}</span>
                <span class="ms-2 text-muted">起</span>
            </div>

            <hr class="my-4">

            <div class="product-details mb-5">
                <h4 class="fw-bold mb-4">產品概覽</h4>
                <div class="text-secondary fs-5" style="white-space: pre-line; line-height: 2;">
                    {{ product.description }}
                </div>
            </div>

            <div class="specs-box p-4 bg-light rounded-4 mb-5">
                <h5 class="fw-bold mb-3">技術規格</h5>
                <ul class="list-unstyled mb-0">
                    <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> 一年有限保固</li>
                    <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> 90 天免費技術支援</li>
                </ul>
            </div>

            <div class="d-grid gap-3">
                <form action="{{ url_for('main.add_to_cart', product_id=product.id) }}" method="POST">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill w-100 fw-bold py-3">
                        加入購物車
                    </button>
                </form>
                <div class="text-center text-muted small">
                    <i class="bi bi-shield-check me-2"></i> 安全結帳與加密保護
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* 讓描述中的點擊列表更有質感 */
    .product-details {
        border-left: 4px solid #0071e3;
        padding-left: 1.5rem;
    }
</style>
{% endblock %}
