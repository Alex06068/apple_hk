{% extends "base.html" %}

{% block title %}登入 - Apple Store{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="bi bi-apple display-1"></i>
                        <h2 class="fw-bold mt-3">登入 Apple ID</h2>
                        <p class="text-muted">使用你的帳號管理訂單</p>
                    </div>

                    {# 修正 1：確保登入動作指向 auth 藍圖 #}
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="form-floating mb-3">
                            <input type="email" name="email" class="form-control rounded-3" id="floatingInput" placeholder="name@example.com" required>
                            <label for="floatingInput">電郵地址</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control rounded-3" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">密碼</label>
                        </div>

                        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3" type="submit">
                            登入
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted">還沒有帳號？</span>
                        {# 修正 2：將 main.register 修改為 auth.register #}
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">立即建立</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
