{% extends "base.html" %}
{% block content %}
<h1>{{ name }} 列表</h1>
<a href="{{ url_for('admin.new_item', model_key=model_key) }}" class="btn btn-success mb-3">添加</a>
<table class="table table-bordered">
    <thead>
        <tr>
            {% for field in fields %}
                <th>{{ field }}</th>
            {% endfor %}
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            {% for field in fields %}
                <td>{{ item[field] }}</td>
            {% endfor %}
            <td>
                <a href="{{ url_for('admin.edit_item', model_key=model_key, id=item.id) }}" class="btn btn-sm btn-primary">编辑</a>
                <a href="{{ url_for('admin.delete_item', model_key=model_key, id=item.id) }}" onclick="return confirm('确定删除？')" class="btn btn-sm btn-danger">删除</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
